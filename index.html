<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce</title>
    <link rel="stylesheet" href="style.css">
    <link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
/>

</head>
<body>
    <main>
        <header>
            <i class="ri-map-pin-2-fill"></i>
            <p>Deliever to Lorem - 890/6</p>
            <div class="money">$0 <i class="ri-wallet-3-fill"></i></div> 
        </header>
        <section class="search">
            <div class="search-bar">
                <div class="suggest">
                <i class="ri-search-line"></i>   
               <input type="text">
            </div>
              <div class="profile">
                <i class="ri-user-5-line"></i>
                <i class="ri-notification-3-fill"></i>
            </div>
        </div>
        </section>
       <div class="category">
        <a href="#">All</a>
        <a href="#">Men</a>
        <a href="#">Women</a>
        <a href="#">Kids</a>
       </div>
       <div class="category2">
                    <div class="box">
                        <p>Men</p>
                    </div>
                     <div class="box2">
                        <p>Women</p>
                    </div>
                     <div class="box3">
                        <p>Kids</p>
                    </div>
       </div>
       <section class="products">
        <div class="product-images">
            <img src="https://i.pinimg.com/originals/67/7c/66/677c66f7ff4bcd65faaf27ad6b8cb6b3.png" alt="">
            </div>
        </section>
    </main>

</html>
